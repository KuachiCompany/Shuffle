<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Draw - HMTI FT UNSIKA</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Stylesheet -->
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Background Glow -->
<div class="bg-glow"></div>

<!-- Wave Decoration Top -->
<div class="wave-top">
  <svg viewBox="0 0 1440 110" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <path d="M0,75 C240,110 480,0 720,55 C960,110 1200,0 1440,55 L1440,0 L0,0 Z" fill="rgba(26,42,122,0.45)"/>
    <path d="M0,95 C360,55 720,130 1080,70 C1260,45 1380,85 1440,75 L1440,0 L0,0 Z" fill="rgba(13,24,84,0.35)"/>
  </svg>
</div>

<!-- =====================
     HEADER
     ===================== -->
<div class="header">
  <div class="logos">
    <!-- Logo UNSIKA -->
    <img src="images/logo-unsika.png" class="logo-img" alt="UNSIKA">
    <div class="logo-divider"></div>
    <!-- Logo HMTI -->
    <img src="images/logo-hmti.jpg" class="logo-img" alt="HMTI">
  </div>
  <div class="hashtag">#LOYALTY<br>FOREVER</div>
</div>

<!-- =====================
     MAIN CONTENT
     ===================== -->
<div class="main">

  <!-- Title -->
  <div class="title-section">
    <!-- Logo Lion -->
    <img src="images/logo-lion.png" class="lion-logo" alt="Logo">
    <h1>Lucky Draw</h1>
    <p class="subtitle">HMTI FT UNSIKA &mdash; Riset Kebutuhan 2026</p>
  </div>

  <!-- Card Upload & Draw -->
  <div class="card">
    <input type="file" id="fileInput" accept=".xlsx,.csv" hidden>

    <!-- Upload Zone -->
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <span class="upload-icon">📊</span>
      <p>Upload File Data Peserta</p>
      <p class="hint">Format: .xlsx atau .csv</p>
      <div class="file-tag" id="fileTag">
        <span>✅</span><span id="tagName"></span>
      </div>
    </div>

    <!-- Winner Count -->
    <div class="count-wrap">
      <label>Jumlah Pemenang</label>
      <div class="count-row">
        <button class="cnt-btn" onclick="changeCount(-1)">−</button>
        <span id="countDisplay">1</span>
        <button class="cnt-btn" onclick="changeCount(1)">+</button>
      </div>
    </div>

    <!-- Draw Button -->
    <button class="draw-btn" id="drawBtn" onclick="startDraw()" disabled>
      🎯 MULAI UNDIAN
    </button>

    <!-- Rolling Name Display -->
    <div class="rolling-section">
      <div class="rolling-label" id="rollingLabel">Mengacak peserta...</div>
      <div class="rolling-name" id="rollingName"></div>
    </div>
  </div>

  <!-- Winners List -->
  <div class="winners-section" id="winnersSection" style="display:none">
    <div class="section-title">🏆 Pemenang Undian</div>
    <div id="winnersList"></div>
  </div>

</div>

<!-- =====================
     FOOTER
     ===================== -->
<div class="footer">
  <div class="footer-ornament">
    <div class="footer-ornament-line"></div>
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2L14.09 8.26L21 9.27L16 14.14L17.18 21.02L12 17.77L6.82 21.02L8 14.14L3 9.27L9.91 8.26L12 2Z"/>
    </svg>
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:12px;height:12px;opacity:0.6;">
      <path d="M12 2L14.09 8.26L21 9.27L16 14.14L17.18 21.02L12 17.77L6.82 21.02L8 14.14L3 9.27L9.91 8.26L12 2Z"/>
    </svg>
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2L14.09 8.26L21 9.27L16 14.14L17.18 21.02L12 17.77L6.82 21.02L8 14.14L3 9.27L9.91 8.26L12 2Z"/>
    </svg>
    <div class="footer-ornament-line right"></div>
  </div>

  <span class="footer-mid">DIVISI RISET · HMTI FT UNSIKA</span>

  <span class="footer-right">@Hmti_unsika</span>
</div>

<!-- XLSX Library (CDN) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- Main Script -->
<script src="js/main.js"></script>

</body>
</html>
